services:
  app:
    build: .
    image: mindbridge-agent:0.1.0
    container_name: mindbridge-agent
    depends_on:
      - mysql
      - redis
      - chroma
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: mysql
      DB_URL: jdbc:mysql://mysql:3306/mindbridge?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USERNAME: mindbridge
      DB_PASSWORD: mindbridge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mindbridge-qwen2.5-7b-ft:latest}
      USE_CHROMA: ${USE_CHROMA:-true}
      CHROMA_BASE_URL: http://chroma:8000
      MEMORY_USE_CHROMA: ${MEMORY_USE_CHROMA:-true}
      MEMORY_CHROMA_BASE_URL: http://chroma:8000
      MEMORY_CHROMA_COLLECTION: ${MEMORY_CHROMA_COLLECTION:-mindbridge_user_memory}
      MCP_EMAIL_MODE: ${MCP_EMAIL_MODE:-log}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

  mysql:
    image: mysql:8.4
    container_name: mindbridge-mysql
    environment:
      MYSQL_DATABASE: mindbridge
      MYSQL_USER: mindbridge
      MYSQL_PASSWORD: mindbridge
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: mindbridge-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  chroma:
    image: chromadb/chroma:latest
    container_name: mindbridge-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

  mailpit:
    image: axllent/mailpit:latest
    container_name: mindbridge-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql-data:
  redis-data:
  chroma-data:
