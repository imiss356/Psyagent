<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1540" viewBox="0 0 2200 1540">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 800 48px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 400 22px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #667085; }
      .lane { fill: #ffffff; stroke: #cfd8e3; stroke-width: 1.8; }
      .lane-title { font: 800 26px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #253449; }
      .card { fill: #ffffff; stroke-width: 2.5; }
      .card-soft { fill: #f8fbff; stroke-width: 2.2; }
      .start { stroke: #0891b2; }
      .api { stroke: #7c3aed; }
      .agent { stroke: #2563eb; }
      .risk { stroke: #dc2626; }
      .data { stroke: #16a34a; }
      .tool { stroke: #f97316; }
      .ops { stroke: #475467; }
      .model { stroke: #0f766e; }
      .card-title { font: 800 24px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .card-body { font: 400 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475467; }
      .small { font: 400 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #667085; }
      .label { font: 800 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #344054; }
      .pill { fill: #eef4ff; stroke: #b2ccff; stroke-width: 1.4; }
      .pill-text { font: 800 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #175cd3; }
      .line { stroke: #667085; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .line-main { stroke: #7c3aed; stroke-width: 3.4; fill: none; marker-end: url(#arrow-purple); }
      .line-agent { stroke: #2563eb; stroke-width: 3.0; fill: none; marker-end: url(#arrow-blue); }
      .line-risk { stroke: #dc2626; stroke-width: 3.0; fill: none; marker-end: url(#arrow-red); }
      .line-data { stroke: #16a34a; stroke-width: 2.8; fill: none; marker-end: url(#arrow-green); }
      .line-tool { stroke: #f97316; stroke-width: 2.8; fill: none; marker-end: url(#arrow-orange); }
      .line-dashed { stroke: #98a2b3; stroke-width: 2.4; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#667085"/>
    </marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" width="2200" height="1540"/>

  <text class="title" x="72" y="70">MindBridge 全项目工作流</text>
  <text class="subtitle" x="72" y="108">模型准备与启动、学生 SSE 对话、多 Agent 编排、RAG 知识库、风险报告、后台工具、评测与发布闭环</text>

  <rect class="lane" x="48" y="132" width="2104" height="190" rx="26"/>
  <text class="lane-title" x="82" y="176">0. 模型、启动与交付链路</text>

  <rect class="card model" x="92" y="210" width="250" height="78" rx="10"/>
  <text class="card-title" x="118" y="244">训练数据</text>
  <text class="card-body" x="118" y="271">data/lora/*.jsonl</text>

  <rect class="card model" x="402" y="210" width="250" height="78" rx="10"/>
  <text class="card-title" x="428" y="244">LoRA 微调</text>
  <text class="card-body" x="428" y="271">Qwen2.5-7B adapter</text>

  <rect class="card model" x="712" y="210" width="250" height="78" rx="10"/>
  <text class="card-title" x="738" y="244">模型产物</text>
  <text class="card-body" x="738" y="271">GGUF + Modelfile</text>

  <rect class="card model" x="1022" y="210" width="280" height="78" rx="10"/>
  <text class="card-title" x="1048" y="244">模型服务</text>
  <text class="card-body" x="1048" y="271">Ollama / OpenAI</text>

  <rect class="card ops" x="1362" y="210" width="300" height="78" rx="10"/>
  <text class="card-title" x="1388" y="244">启动脚本</text>
  <text class="card-body" x="1388" y="271">run-dev / docker compose</text>

  <rect class="card ops" x="1722" y="210" width="330" height="78" rx="10"/>
  <text class="card-title" x="1748" y="244">Spring Boot 应用</text>
  <text class="card-body" x="1748" y="271">WebFlux + JPA + Redis + MCP</text>

  <path class="line" d="M342 249 H402"/>
  <path class="line" d="M652 249 H712"/>
  <path class="line" d="M962 249 H1022"/>
  <path class="line" d="M1302 249 H1362"/>
  <path class="line" d="M1662 249 H1722"/>

  <rect class="lane" x="48" y="350" width="2104" height="195" rx="26"/>
  <text class="lane-title" x="82" y="394">1. 入口与权限 / API 层</text>

  <rect class="card start" x="92" y="430" width="210" height="78" rx="10"/>
  <text class="card-title" x="118" y="463">学生入口</text>
  <text class="card-body" x="118" y="490">陪伴聊天</text>

  <rect class="card start" x="342" y="430" width="230" height="78" rx="10"/>
  <text class="card-title" x="368" y="463">管理员入口</text>
  <text class="card-body" x="368" y="490">看板 / 知识 / 报告</text>

  <rect class="card start" x="632" y="430" width="235" height="78" rx="10"/>
  <text class="card-title" x="658" y="463">Web 前端</text>
  <text class="card-body" x="658" y="490">static/index.html</text>

  <rect class="card api" x="927" y="430" width="260" height="78" rx="10"/>
  <text class="card-title" x="953" y="463">Spring Security</text>
  <text class="card-body" x="953" y="490">Basic Auth + 角色</text>

  <rect class="card api" x="1247" y="410" width="250" height="76" rx="10"/>
  <text class="card-title" x="1273" y="443">ChatController</text>
  <text class="card-body" x="1273" y="469">/api/chat/stream</text>

  <rect class="card api" x="1247" y="498" width="250" height="76" rx="10"/>
  <text class="card-title" x="1273" y="531">Profile / Status</text>
  <text class="card-body" x="1273" y="557">账号信息 + 模型状态</text>

  <rect class="card api" x="1582" y="410" width="280" height="76" rx="10"/>
  <text class="card-title" x="1608" y="443">Admin APIs</text>
  <text class="card-body" x="1608" y="469">知识库 / 报告 / 预警</text>

  <rect class="card api" x="1902" y="430" width="210" height="78" rx="10"/>
  <text class="card-title" x="1928" y="463">HomeController</text>
  <text class="card-body" x="1928" y="490">根路径返回首页</text>

