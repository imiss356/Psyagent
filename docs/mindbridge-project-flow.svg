  <rect class="lane" x="48" y="575" width="2104" height="445" rx="26"/>
  <text class="lane-title" x="82" y="619">2. 学生对话主链路：受控多 Agent Loop</text>

  <rect class="pill" x="92" y="648" width="730" height="46" rx="10"/>
  <text class="pill-text" x="116" y="678">核心分支：CHAT 直接陪伴回复；CONSULT / RISK 才进入 RAG 检索、风险守护和心理支持回复</text>

  <rect class="card api" x="92" y="730" width="230" height="104" rx="10"/>
  <text class="card-title" x="118" y="765">ChatService</text>
  <text class="card-body" x="118" y="793">会话创建 / 消息保存</text>
  <text class="card-body" x="118" y="819">隐私脱敏 / SSE 流转</text>

  <rect class="card api" x="382" y="730" width="280" height="104" rx="10"/>
  <text class="card-title" x="408" y="765">AgentRuntimeService</text>
  <text class="card-body" x="408" y="793">MAX_STEPS = 8</text>
  <text class="card-body" x="408" y="819">supports() 选择下个 Agent</text>

  <rect class="card agent" x="742" y="682" width="250" height="88" rx="10"/>
  <text class="card-title" x="768" y="716">MemoryAgent</text>
  <text class="card-body" x="768" y="744">Redis 优先，DB 兜底</text>

  <rect class="card agent" x="1062" y="682" width="270" height="88" rx="10"/>
  <text class="card-title" x="1088" y="716">SupervisorAgent</text>
  <text class="card-body" x="1088" y="744">CHAT / CONSULT / RISK</text>

  <rect class="card agent" x="1442" y="640" width="260" height="88" rx="10"/>
  <text class="card-title" x="1468" y="674">CompanionAgent</text>
  <text class="card-body" x="1468" y="702">普通聊天回复规划</text>

  <rect class="card agent" x="742" y="865" width="250" height="88" rx="10"/>
  <text class="card-title" x="768" y="899">KnowledgeAgent</text>
  <text class="card-body" x="768" y="927">改写 query + RAG 检索</text>

  <rect class="card risk" x="1062" y="865" width="270" height="88" rx="10"/>
  <text class="card-title" x="1088" y="899">RiskGuardianAgent</text>
  <text class="card-body" x="1088" y="927">词库硬规则 + 后台评估</text>

  <rect class="card agent" x="1442" y="865" width="260" height="88" rx="10"/>
  <text class="card-title" x="1468" y="899">CounselorAgent</text>
  <text class="card-body" x="1468" y="927">结合 RAG / 风险生成策略</text>

  <rect class="card model" x="1802" y="720" width="260" height="104" rx="10"/>
  <text class="card-title" x="1828" y="755">AiClient</text>
  <text class="card-body" x="1828" y="783">Spring AI 统一适配</text>
  <text class="card-body" x="1828" y="809">complete() + stream()</text>

  <rect class="card-soft start" x="1802" y="870" width="260" height="82" rx="10"/>
  <text class="card-title" x="1828" y="903">SSE 返回学生端</text>
  <text class="card-body" x="1828" y="930">meta / token / done</text>

