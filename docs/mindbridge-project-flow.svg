  <rect class="lane" x="48" y="1050" width="2104" height="285" rx="26"/>
  <text class="lane-title" x="82" y="1094">3. 数据、RAG、后台报告与工具闭环</text>

  <rect class="card data" x="92" y="1150" width="245" height="96" rx="10"/>
  <text class="card-title" x="118" y="1185">MySQL / H2</text>
  <text class="card-body" x="118" y="1213">用户、会话、消息</text>
  <text class="card-body" x="118" y="1238">报告、知识切块</text>

  <rect class="card data" x="387" y="1150" width="220" height="96" rx="10"/>
  <text class="card-title" x="413" y="1185">Redis</text>
  <text class="card-body" x="413" y="1213">短期记忆</text>
  <text class="card-body" x="413" y="1238">24h TTL 会话缓存</text>

  <rect class="card data" x="657" y="1150" width="280" height="96" rx="10"/>
  <text class="card-title" x="683" y="1185">KnowledgeService</text>
  <text class="card-body" x="683" y="1213">切块 / 入库 / 混合检索</text>
  <text class="card-body" x="683" y="1238">Chroma 优先，BM25 兜底</text>

  <rect class="card data" x="987" y="1150" width="230" height="96" rx="10"/>
  <text class="card-title" x="1013" y="1185">Chroma</text>
  <text class="card-body" x="1013" y="1213">可选向量镜像</text>
  <text class="card-body" x="1013" y="1238">use-chroma=true</text>

  <rect class="card risk" x="1267" y="1150" width="255" height="96" rx="10"/>
  <text class="card-title" x="1293" y="1185">心理报告</text>
  <text class="card-body" x="1293" y="1213">CONSULT / RISK 生成</text>
  <text class="card-body" x="1293" y="1238">情绪、风险、置信度</text>

  <rect class="card tool" x="1572" y="1150" width="250" height="96" rx="10"/>
  <text class="card-title" x="1598" y="1185">工具编排</text>
  <text class="card-body" x="1598" y="1213">先写 Excel</text>
  <text class="card-body" x="1598" y="1238">HIGH 再发预警</text>

  <rect class="card tool" x="1872" y="1150" width="240" height="96" rx="10"/>
  <text class="card-title" x="1898" y="1185">MCP / HTTP / SMTP</text>
  <text class="card-body" x="1898" y="1213">Excel 台账</text>
  <text class="card-body" x="1898" y="1238">邮件或日志预警</text>

  <rect class="pill" x="92" y="1280" width="610" height="36" rx="9"/>
  <text class="pill-text" x="116" y="1304">管理员链路：上传知识文件 -> 解析 PDF/MD/TXT -> KnowledgeService 入库；后台看板读取报告、Excel、Alert 记录</text>

