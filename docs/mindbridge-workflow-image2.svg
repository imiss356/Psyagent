  <rect class="lane shadow" x="48" y="1160" width="2304" height="260" rx="8"/>
  <text class="lane-title" x="78" y="1204">3. RAG、报告与工具闭环</text>
  <text class="lane-note" x="78" y="1232">管理员维护知识库；咨询/风险消息生成后台报告；高风险按“写 Excel 成功后再预警”的顺序执行。</text>

  <rect class="card green fill-green" x="88" y="1270" width="260" height="82" rx="8"/>
  <text class="card-title" x="114" y="1301">知识来源</text>
  <text class="card-body" x="114" y="1328">内置 knowledge/*</text>
  <text class="card-body" x="114" y="1349">管理员上传 PDF/MD/TXT</text>

  <rect class="card green fill-green" x="400" y="1270" width="255" height="82" rx="8"/>
  <text class="card-title" x="426" y="1301">KnowledgeService</text>
  <text class="card-body" x="426" y="1328">切块 / embedding / 入库</text>
  <text class="card-body" x="426" y="1349">混合检索 + 上下文扩展</text>

  <rect class="card green fill-green" x="705" y="1270" width="250" height="82" rx="8"/>
  <text class="card-title" x="731" y="1301">检索存储</text>
  <text class="card-body" x="731" y="1328">MySQL/H2 KnowledgeChunk</text>
  <text class="card-body" x="731" y="1349">Chroma 可选镜像</text>

  <rect class="card red fill-red" x="1030" y="1270" width="260" height="82" rx="8"/>
  <text class="card-title" x="1056" y="1301">心理报告</text>
  <text class="card-body" x="1056" y="1328">CONSULT / RISK 保存</text>
  <text class="card-body" x="1056" y="1349">情绪、风险、置信度</text>

  <rect class="card orange fill-orange" x="1345" y="1270" width="285" height="82" rx="8"/>
  <text class="card-title" x="1371" y="1301">ToolOrchestration</text>
  <text class="card-body" x="1371" y="1328">回复完成后异步执行</text>
  <text class="card-body" x="1371" y="1349">Excel 成功后才发 HIGH 预警</text>

  <rect class="card orange fill-orange" x="1685" y="1270" width="270" height="82" rx="8"/>
  <text class="card-title" x="1711" y="1301">Excel 台账</text>
  <text class="card-body" x="1711" y="1328">local / http / mcp</text>
  <text class="card-body" x="1711" y="1349">data/mindbridge-reports.xlsx</text>

  <rect class="card red fill-red" x="2010" y="1270" width="275" height="82" rx="8"/>
  <text class="card-title" x="2036" y="1301">预警通知</text>
  <text class="card-body" x="2036" y="1328">SMTP / HTTP / MCP / log</text>
  <text class="card-body" x="2036" y="1349">AlertRecord 记录重试结果</text>

