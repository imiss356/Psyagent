      .card-body { font: 400 16px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #667085; }
      .label { font: 800 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #344054; }
      .chip { fill: #f2f4f7; stroke: #d0d5dd; stroke-width: 1.4; }
      .chip-text { font: 800 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #344054; }
      .blue { stroke: #2563eb; }
      .teal { stroke: #0f766e; }
      .purple { stroke: #7c3aed; }
      .green { stroke: #16a34a; }
      .orange { stroke: #f97316; }
      .red { stroke: #dc2626; }
      .slate { stroke: #64748b; }
      .fill-blue { fill: #eff6ff; }
      .fill-teal { fill: #ecfdf5; }
      .fill-purple { fill: #f5f3ff; }
      .fill-green { fill: #f0fdf4; }
      .fill-orange { fill: #fff7ed; }
      .fill-red { fill: #fff1f2; }
      .line { stroke: #64748b; stroke-width: 2.6; fill: none; marker-end: url(#arrow-slate); }
      .line-main { stroke: #7c3aed; stroke-width: 3.4; fill: none; marker-end: url(#arrow-purple); }
      .line-blue { stroke: #2563eb; stroke-width: 3.0; fill: none; marker-end: url(#arrow-blue); }
      .line-teal { stroke: #0f766e; stroke-width: 3.0; fill: none; marker-end: url(#arrow-teal); }
      .line-green { stroke: #16a34a; stroke-width: 2.9; fill: none; marker-end: url(#arrow-green); }
