  </defs>

  <rect class="bg" width="2400" height="1600"/>

  <text class="title" x="72" y="72">MindBridge 全项目 Workflow</text>
  <text class="subtitle" x="72" y="112">从模型准备、系统启动、学生 SSE 对话、多 Agent 编排，到 RAG 知识库、风险报告、MCP 工具、评测和发布的完整闭环</text>

  <rect class="lane shadow" x="48" y="142" width="2304" height="180" rx="8"/>
  <text class="lane-title" x="78" y="186">0. 模型与启动层</text>
  <text class="lane-note" x="78" y="214">本地微调模型是默认路径，也可以通过环境变量切换到 OpenAI。</text>

  <rect class="card teal fill-teal" x="80" y="242" width="250" height="58" rx="8"/>
  <text class="card-title" x="105" y="268">训练数据</text>
  <text class="card-body" x="105" y="292">data/lora/*.jsonl</text>

  <rect class="card teal fill-teal" x="390" y="242" width="270" height="58" rx="8"/>
  <text class="card-title" x="415" y="268">LoRA 微调 / 合并</text>
  <text class="card-body" x="415" y="292">Qwen2.5-7B adapter</text>

  <rect class="card teal fill-teal" x="720" y="242" width="260" height="58" rx="8"/>
  <text class="card-title" x="745" y="268">GGUF + Modelfile</text>
  <text class="card-body" x="745" y="292">mindbridge-qwen2.5</text>

  <rect class="card teal fill-teal" x="1040" y="242" width="260" height="58" rx="8"/>
  <text class="card-title" x="1065" y="268">模型服务</text>
  <text class="card-body" x="1065" y="292">Ollama / OpenAI</text>

  <rect class="card slate" x="1360" y="242" width="300" height="58" rx="8"/>
  <text class="card-title" x="1385" y="268">启动依赖</text>
  <text class="card-body" x="1385" y="292">JDK / Maven / Docker Compose</text>

  <rect class="card slate" x="1720" y="242" width="265" height="58" rx="8"/>
  <text class="card-title" x="1745" y="268">运行脚本</text>
  <text class="card-body" x="1745" y="292">scripts/run-dev.sh</text>

  <rect class="card purple fill-purple" x="2045" y="242" width="250" height="58" rx="8"/>
  <text class="card-title" x="2070" y="268">Spring Boot</text>
  <text class="card-body" x="2070" y="292">WebFlux + JPA + Security</text>

  <path class="line-teal" d="M330 271 H390"/>
  <path class="line-teal" d="M660 271 H720"/>
  <path class="line-teal" d="M980 271 H1040"/>
