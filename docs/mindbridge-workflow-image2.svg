      .line-red { stroke: #dc2626; stroke-width: 3.0; fill: none; marker-end: url(#arrow-red); }
      .line-dash { stroke: #98a2b3; stroke-width: 2.4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow-slate); }
      .boundary { fill: none; stroke: #bfdbfe; stroke-width: 2.2; stroke-dasharray: 10 8; }
      .shadow { filter: url(#shadow); }
    </style>
