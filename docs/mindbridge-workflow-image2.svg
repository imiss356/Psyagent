  <rect class="lane shadow" x="48" y="615" width="2304" height="515" rx="8"/>
  <text class="lane-title" x="78" y="659">2. 学生 SSE 对话主链路</text>
  <text class="lane-note" x="78" y="687">每轮输入先进受控 Agent loop，最多 8 步；CHAT 不查 RAG、不生成心理报告，CONSULT / RISK 才进入知识检索与风险守护。</text>

  <rect class="card purple fill-purple" x="88" y="738" width="245" height="92" rx="8"/>
  <text class="card-title" x="114" y="771">ChatService.prepare</text>
  <text class="card-body" x="114" y="799">会话创建 / 输入脱敏</text>
  <text class="card-body" x="114" y="821">保存用户消息到 DB</text>

  <rect class="card purple fill-purple" x="390" y="738" width="275" height="92" rx="8"/>
  <text class="card-title" x="416" y="771">AgentRuntimeService</text>
  <text class="card-body" x="416" y="799">MAX_STEPS = 8</text>
  <text class="card-body" x="416" y="821">supports() 选择下一步</text>

  <rect class="boundary" x="715" y="708" width="1020" height="375" rx="8"/>
  <text class="label" x="735" y="733">受控多 Agent loop</text>

  <rect class="card blue fill-blue" x="755" y="760" width="235" height="74" rx="8"/>
  <text class="card-title" x="781" y="790">MemoryAgent</text>
  <text class="card-body" x="781" y="817">Redis 优先，MySQL 兜底</text>

  <rect class="card blue fill-blue" x="1050" y="760" width="255" height="74" rx="8"/>
  <text class="card-title" x="1076" y="790">SupervisorAgent</text>
  <text class="card-body" x="1076" y="817">CHAT / CONSULT / RISK</text>

  <rect class="card green fill-green" x="760" y="910" width="240" height="82" rx="8"/>
  <text class="card-title" x="786" y="941">KnowledgeAgent</text>
  <text class="card-body" x="786" y="968">query 改写 / 检索 / 二查</text>

  <rect class="card red fill-red" x="1060" y="910" width="255" height="82" rx="8"/>
  <text class="card-title" x="1086" y="941">RiskGuardianAgent</text>
  <text class="card-body" x="1086" y="968">心理评估 + 高风险兜底</text>

  <rect class="card blue fill-blue" x="1415" y="750" width="255" height="82" rx="8"/>
  <text class="card-title" x="1441" y="781">CompanionAgent</text>
  <text class="card-body" x="1441" y="808">普通陪伴回复策略</text>

  <rect class="card blue fill-blue" x="1415" y="910" width="255" height="82" rx="8"/>
  <text class="card-title" x="1441" y="941">CounselorAgent</text>
  <text class="card-body" x="1441" y="968">RAG + 风险结果生成策略</text>

  <rect class="card teal fill-teal" x="1800" y="780" width="250" height="90" rx="8"/>
  <text class="card-title" x="1826" y="812">AiClient</text>
  <text class="card-body" x="1826" y="840">Spring AI 统一适配</text>
  <text class="card-body" x="1826" y="862">complete() / stream()</text>

  <rect class="card teal fill-teal" x="2100" y="780" width="205" height="90" rx="8"/>
  <text class="card-title" x="2126" y="812">模型输出</text>
  <text class="card-body" x="2126" y="840">Ollama 本地模型</text>
  <text class="card-body" x="2126" y="862">或 OpenAI</text>

  <rect class="card purple fill-purple" x="1800" y="940" width="250" height="90" rx="8"/>
  <text class="card-title" x="1826" y="972">SSE 返回</text>
  <text class="card-body" x="1826" y="1000">meta / token / done</text>
  <text class="card-body" x="1826" y="1022">保存助手消息</text>

  <rect class="card-soft slate" x="2100" y="940" width="205" height="90" rx="8"/>
  <text class="card-title" x="2126" y="972">学生端体验</text>
  <text class="card-body" x="2126" y="1000">打字机式响应</text>
  <text class="card-body" x="2126" y="1022">后台标签不外显</text>

