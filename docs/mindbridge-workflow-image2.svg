  <rect class="chip" x="88" y="1030" width="575" height="54" rx="8"/>
  <text class="chip-text" x="114" y="1062">持久化：ChatMessage / ChatSession 写入 MySQL 或 H2，同时追加 Redis 短期记忆。</text>

  <path class="line-dash" d="M210 830 V1030"/>
