  <rect class="lane shadow" x="48" y="350" width="2304" height="235" rx="8"/>
  <text class="lane-title" x="78" y="394">1. 入口与 API 层</text>
  <text class="lane-note" x="78" y="422">学生端主要走流式聊天；管理员端维护知识库、查看报告、Excel 记录和预警记录。</text>

  <rect class="card blue fill-blue" x="86" y="458" width="205" height="72" rx="8"/>
  <text class="card-title" x="112" y="489">学生</text>
  <text class="card-body" x="112" y="516">陪伴聊天 / 历史会话</text>

  <rect class="card orange fill-orange" x="86" y="540" width="205" height="72" rx="8"/>
  <text class="card-title" x="112" y="571">管理员</text>
  <text class="card-body" x="112" y="598">知识库 / 报告看板</text>

  <rect class="card slate" x="350" y="500" width="255" height="82" rx="8"/>
  <text class="card-title" x="376" y="531">Web 前端</text>
  <text class="card-body" x="376" y="558">static/index.html</text>
  <text class="card-body" x="376" y="579">app.js / styles.css</text>

  <rect class="card purple fill-purple" x="665" y="500" width="255" height="82" rx="8"/>
  <text class="card-title" x="691" y="531">Spring Security</text>
  <text class="card-body" x="691" y="558">Basic Auth</text>
  <text class="card-body" x="691" y="579">student / admin 角色</text>

  <rect class="card purple fill-purple" x="1000" y="458" width="285" height="72" rx="8"/>
  <text class="card-title" x="1026" y="489">ChatController</text>
  <text class="card-body" x="1026" y="516">POST /api/chat/stream</text>

  <rect class="card purple fill-purple" x="1000" y="540" width="285" height="72" rx="8"/>
  <text class="card-title" x="1026" y="571">Profile / Status</text>
  <text class="card-body" x="1026" y="598">账号信息 + 模型状态</text>

  <rect class="card orange fill-orange" x="1368" y="458" width="310" height="72" rx="8"/>
  <text class="card-title" x="1394" y="489">KnowledgeController</text>
  <text class="card-body" x="1394" y="516">POST /api/admin/knowledge</text>

  <rect class="card orange fill-orange" x="1368" y="540" width="310" height="72" rx="8"/>
  <text class="card-title" x="1394" y="571">ReportController</text>
  <text class="card-body" x="1394" y="598">reports / excel / alerts</text>

  <rect class="card slate" x="1780" y="500" width="265" height="82" rx="8"/>
  <text class="card-title" x="1806" y="531">HomeController</text>
  <text class="card-body" x="1806" y="558">根路径返回首页</text>
  <text class="card-body" x="1806" y="579">端口默认 8080</text>

  <rect class="chip" x="2115" y="500" width="190" height="82" rx="8"/>
  <text class="chip-text" x="2141" y="532">入口结果</text>
  <text class="tiny" x="2141" y="558">学生走聊天主链路</text>
  <text class="tiny" x="2141" y="579">管理员走运营闭环</text>

